name: Live Claude

# Required (no continue-on-error) and runs unconditionally: the script hard-fails
# if ANTHROPIC_API_KEY is missing, so a deleted/renamed secret — or a fork PR
# without secret access — turns the build red instead of skipping silently.
on:
  push:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**', 'LICENSE', '.gitignore']
  pull_request:
    paths-ignore: ['**/*.md', 'docs/**', 'LICENSE', '.gitignore']

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  live-claude:
    name: Live Claude E2E (required, paid)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    runs-on: ${{ matrix.os }}
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - run: npm install
      - name: Install Claude Code CLI
        # pinned — bump deliberately; drift canary tracks @latest
        run: npm install -g @anthropic-ai/claude-code@2.1.205
      - name: macOS preflight (FDA grant + auth seed)
        if: runner.os == 'macOS'
        run: node scripts/mac-preflight-grant.mjs --seed-auth
      - name: Drive Claude end-to-end (hard-fails if key missing or hook silent)
        run: node scripts/live-claude.mjs
      - name: Diagnostics (always, macOS)
        if: always() && runner.os == 'macOS'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: live-claude-macos-diag
          path: ${{ runner.temp }}/diag
        continue-on-error: true
