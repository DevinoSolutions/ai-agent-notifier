name: E2E

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

# The E2E tier deliberately exercises the real public ntfy.sh (an accepted
# external dependency; hermetic, no-network coverage lives in the unit tier via
# local HTTP servers). Transient network flakes are retried by the poll helpers.
jobs:
  e2e:
    name: E2E real-world (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - run: npm install
      - name: Real ntfy + hook + setup e2e
        run: npm run test:e2e
