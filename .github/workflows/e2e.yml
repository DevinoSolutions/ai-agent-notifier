name: E2E

on:
  push:
  pull_request:

jobs:
  e2e:
    name: E2E real-world (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Real ntfy + hook + setup e2e
        run: npm run test:e2e
