name: Toast Linux

# Real native desktop-notification coverage: fires through the real notify-send
# backend into a real notification daemon (dunst) and asserts the captured
# title + body. Headless CI can't prove a human SAW it — see `npm run toast:demo`.
on:
  push:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**', 'LICENSE', '.gitignore']
  pull_request:
    paths-ignore: ['**/*.md', 'docs/**', 'LICENSE', '.gitignore']

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  toast-linux:
    name: Live Toast Linux (notify-send → dunst capture)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - run: npm install
      - name: Install notification daemon + capture/OCR tooling
        # fonts-dejavu-core: dunst needs a font to initialise its renderer under xvfb.
        # imagemagick (import/convert) + x11-apps (xwd) capture the root window;
        # tesseract-ocr reads the rendered banner text back off the framebuffer.
        run: sudo apt-get update && sudo apt-get install -y dunst dbus-x11 xvfb libnotify-bin fonts-dejavu-core imagemagick tesseract-ocr x11-apps
      - name: Fire a real notification and assert dunst captured it (layer 2 — daemon record)
        run: xvfb-run -a dbus-run-session -- node scripts/live-toast-linux.mjs
      - name: Prove `aan doctor --deep` verifies real delivery via dunst read-back (product diagnostic)
        # Runs the SHIPPING CLI (not a bespoke script): the Linux --deep probe fires
        # through notify-send and reads the toast back out of dunst's history. This
        # turns the doctor probe (TC-27) into a hard-proven behaviour, not unit-only.
        run: |
          xvfb-run -a dbus-run-session -- bash -euo pipefail -c '
            dunst &
            for i in $(seq 1 40); do dunstctl is-paused >/dev/null 2>&1 && break; sleep 0.25; done
            node cli/index.mjs doctor --deep --json | tee /tmp/doctor-deep.json
            node -e "const j=JSON.parse(require(\"fs\").readFileSync(\"/tmp/doctor-deep.json\",\"utf8\"));const d=j.checks.find(c=>c.id===\"toast-deep\");if(!d){console.error(\"FAIL: no toast-deep row in doctor --deep output\");process.exit(1);}if(d.status!==\"ok\"){console.error(\"FAIL: toast-deep status=\"+d.status+\" — \"+d.detail);process.exit(1);}console.log(\"PASS (hard): aan doctor --deep verified real delivery via dunst — \"+d.detail);"
          '
      - name: Prove it renders legible pixels on X (layer 3 — OCR-verified)
        env:
          RENDER_OUT: /tmp/linux-render-proof
        run: xvfb-run -a dbus-run-session -- node scripts/live-toast-linux-render.mjs
      - name: Upload rendered banner (proof a human can see)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: linux-render-proof
          path: /tmp/linux-render-proof
