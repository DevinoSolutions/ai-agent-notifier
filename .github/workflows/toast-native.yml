name: Toast Native

# Real native desktop-notification coverage on Windows: fires the real BurntToast
# backend and asserts the OS accepted the toast. macOS delivery is proven by the
# toast-macos.yml lane (Notification Center DB capture).
on:
  push:
    paths-ignore: ['**/*.md', 'docs/**', 'LICENSE', '.gitignore']
  pull_request:
    paths-ignore: ['**/*.md', 'docs/**', 'LICENSE', '.gitignore']

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  toast-native:
    name: Live Toast Native (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
    runs-on: ${{ matrix.os }}
    env:
      AAN_TOAST_LIVE: '1'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - run: npm install
      - name: Install BurntToast (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Install-Module -Name BurntToast -Force -Scope CurrentUser -AllowClobber
      - name: Fire the real native toast backend and assert success
        run: node --test tests/platforms.test.mjs
