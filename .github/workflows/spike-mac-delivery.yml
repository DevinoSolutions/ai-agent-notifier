name: Spike Mac Delivery (scratch — delete before merge)

on:
  workflow_dispatch:
  push:
    branches: [feat/mac-real-ux]
    paths: ['.github/workflows/spike-mac-delivery.yml']

jobs:
  spike:
    name: Spike v2 — where do notifications land + how to decode (macos-15)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Tables + baseline counts
        run: |
          DB="$HOME/Library/Group Containers/group.com.apple.usernoted/db2/db"
          RO="file:$DB?mode=ro&immutable=1"
          echo "== tables =="; sqlite3 "$RO" ".tables"
          echo "== per-table row counts (baseline) =="
          for t in $(sqlite3 "$RO" ".tables"); do
            printf "%s = " "$t"; sqlite3 "$RO" "select count(*) from $t;" 2>&1
          done

      - name: Fire osascript marker, then locate it across the WHOLE db
        run: |
          DB="$HOME/Library/Group Containers/group.com.apple.usernoted/db2/db"
          RO="file:$DB?mode=ro&immutable=1"
          MARK="osa-$GITHUB_RUN_ID"
          echo "firing osascript marker: $MARK"
          osascript -e "display notification \"body $MARK\" with title \"AAN $MARK\"" ; echo "exit: $?"
          sleep 4
          echo "== record count after =="; sqlite3 "$RO" "select count(*) from record;"
          echo "== full .dump grep for marker (any table) =="
          sqlite3 "$RO" ".dump" 2>/dev/null | grep -c "$MARK" || echo "0 textual hits"
          echo "== search every data BLOB (hex) in record+delivered for marker =="
          HEXMARK=$(printf '%s' "$MARK" | xxd -p | tr -d '\n')
          for t in record delivered; do
            cols=$(sqlite3 "$RO" "PRAGMA table_info($t);" 2>/dev/null | grep -i data | head -1)
            [ -z "$cols" ] && { echo "$t: no data col"; continue; }
            hits=$(sqlite3 "$RO" "select count(*) from $t where hex(data) like '%$(echo $HEXMARK | tr a-z A-Z)%';" 2>&1)
            echo "$t rows whose data BLOB contains marker bytes: $hits"
          done

      - name: Install terminal-notifier, fire marker, locate it
        run: |
          brew install terminal-notifier 2>&1 | tail -2 || true
          DB="$HOME/Library/Group Containers/group.com.apple.usernoted/db2/db"
          RO="file:$DB?mode=ro&immutable=1"
          MARK="tn-$GITHUB_RUN_ID"
          terminal-notifier -title "AAN $MARK" -message "body $MARK" 2>&1 | tail -2 || true
          sleep 4
          echo "== record count after terminal-notifier =="; sqlite3 "$RO" "select count(*) from record;"
          HEXMARK=$(printf '%s' "$MARK" | xxd -p | tr -d '\n' | tr a-z A-Z)
          for t in record delivered; do
            hits=$(sqlite3 "$RO" "select count(*) from $t where hex(data) like '%$HEXMARK%';" 2>&1)
            echo "$t rows containing terminal-notifier marker: $hits"
          done
          echo "== app table (who is registered) =="; sqlite3 "$RO" "select rowid, hex(substr(identifier,1,60)) from app limit 20;" 2>&1 | head -25 || true
          echo "== app identifiers as text =="; sqlite3 "$RO" "select identifier from app;" 2>&1 | head -25 || true

      - name: Decode a real record via xml1 (json fails on NSDate/NSData)
        run: |
          DB="$HOME/Library/Group Containers/group.com.apple.usernoted/db2/db"
          RO="file:$DB?mode=ro&immutable=1"
          echo "== newest record → xml1 =="
          sqlite3 "$RO" "select hex(data) from record order by rec_id desc limit 1;" \
            | xxd -r -p | plutil -convert xml1 -o - - 2>&1 | head -80
          echo "== newest record → plutil -p (human) =="
          sqlite3 "$RO" "select hex(data) from record order by rec_id desc limit 1;" \
            | xxd -r -p | plutil -p - 2>&1 | head -60
          # Save newest few records for fixtures.
          sqlite3 "$RO" "select hex(data) from record order by rec_id desc limit 5;" > /tmp/spike-records.txt

      - name: ncprefs readability (xml1 + defaults)
        run: |
          P="$HOME/Library/Preferences/com.apple.ncprefs.plist"
          echo "== xml1 convert (first 40 lines) =="
          plutil -convert xml1 -o - "$P" 2>&1 | head -40 || echo "(xml1 failed)"
          echo "== defaults read apps count =="
          defaults read com.apple.ncprefs apps 2>&1 | head -30 || echo "(defaults failed)"

      - name: Upload fixtures
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: spike-mac-delivery-v2
          path: /tmp/spike-records.txt
