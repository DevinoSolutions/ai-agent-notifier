name: Live Codex

# Required (no continue-on-error) and runs unconditionally: the script hard-fails
# if OPENAI_API_KEY is missing. codex exec needs OpenAI Tier 1+ WebSocket access,
# so this job validates the live key + the real config-patch wiring instead of an
# API round-trip.
on:
  push:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**', 'LICENSE', '.gitignore']
  pull_request:
    paths-ignore: ['**/*.md', 'docs/**', 'LICENSE', '.gitignore']

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  live-codex:
    name: Live Codex (key + hook wiring validation)
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - run: npm install
      - name: Install Codex CLI
        # pinned — bump deliberately; drift canary tracks @latest
        run: npm install -g @openai/codex@0.144.0
      - name: Verify OPENAI_API_KEY reaches OpenAI API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            https://api.openai.com/v1/models)
          echo "OpenAI API status for /v1/models: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "FAIL: OpenAI API returned $STATUS — key invalid or inaccessible"
            exit 1
          fi
      - name: Validate Codex config-patch wiring (hard-fails if key missing)
        run: node scripts/live-codex.mjs
