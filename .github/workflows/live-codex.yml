name: Live Codex

# Validates the codex EXEC path: OPENAI_API_KEY is valid, our codex config +
# PermissionRequest hook wiring is accepted by the real codex binary, and codex
# completes a real turn under exec. The approval DECISION loop (allow/deny) is
# NOT provable here — non-interactive `codex exec` forces approval:never +
# read-only sandbox — it is proven by the interactive TUI lane (TUI Proofs / F2,
# scripts/tui/proof-codex-approval.mjs).
on:
  push:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**', 'LICENSE', '.gitignore']
  pull_request:
    paths-ignore: ['**/*.md', 'docs/**', 'LICENSE', '.gitignore']

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  live-codex:
    name: Live Codex (approval loop)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15]
    runs-on: ${{ matrix.os }}
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - run: npm install
      - name: Install Codex CLI
        # pinned — bump deliberately; drift canary tracks @latest
        run: npm install -g @openai/codex@0.144.0
      - name: Verify OPENAI_API_KEY reaches OpenAI API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer $OPENAI_API_KEY" https://api.openai.com/v1/models)
          echo "OpenAI API status: $STATUS"
          [ "$STATUS" = "200" ] || { echo "FAIL: OpenAI API returned $STATUS"; exit 1; }
      - name: Codex exec — key valid + config accepted + real completed turn
        run: node scripts/live-codex.mjs
